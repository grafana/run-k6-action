  env-var-cli-flag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Grafana k6
        uses: grafana/setup-k6-action@v1
      - uses: ./
        continue-on-error: true
        with:
          debug: true
          path: |
            ./dev/env-var.js
          flags: --env TEST_VAL=hello-from-cli --env URL=http://test.k6.io
          inspect-flags: --env TEST_VAL=hello-from-cli --env URL=http://test.k6.io
          cloud-run-locally: false

  env-var-system-env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Grafana k6
        uses: grafana/setup-k6-action@v1
      - uses: ./
        env:
          TEST_VAL: hello-from-env
          URL: http://test.k6.io
        with:
          debug: true
          path: |
            ./dev/env-var.js
          inspect-flags: --include-system-env-vars
          cloud-run-locally: false